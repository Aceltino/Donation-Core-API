name: App CI/CD - Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env: { POSTGRES_PASSWORD: password }
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      
      - name: Install & Test
        run: |
          pnpm install
          pnpm --filter donation-core exec prisma generate
          # pnpm test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/transparencia_agil?schema=public

  build-and-push:
    needs: test-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag and Push Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Build em paralelo (opcional, mas aqui vamos na sequência para clareza)
          docker build -f Dockerfile.api-gateway -t $REGISTRY/api-gateway:latest .
          docker build -f Dockerfile.donation-core -t $REGISTRY/donation-core:latest .
          docker build -f Dockerfile.worker-hub -t $REGISTRY/worker-hub:latest .
          
          docker push $REGISTRY/api-gateway:latest
          docker push $REGISTRY/donation-core:latest
          docker push $REGISTRY/worker-hub:latest

      - name: Deploy to Amazon ECS
        run: |
          # Força o ECS a baixar a imagem 'latest' que acabamos de subir
          services=("api-gateway-service" "donation-core-service" "worker-hub-service")
          for service in "${services[@]}"; do
            aws ecs update-service --cluster transparencia-agil-cluster --service $service --force-new-deployment --region us-east-1
          done